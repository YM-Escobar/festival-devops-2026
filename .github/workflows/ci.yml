name: Verificacion de Estructura del Proyecto

on:
  push:
    branches:
      - master


jobs:
  verificar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Verificar archivo index.html
        run: test -f frontend/index.html

      - name: Verificar archivo style.css
        run: test -f backend/js/script.js

      - name: Verificar archivo style.css
        run: test -f frontend/css/style.css

      - name: Verificar archivo README.md
        run: test -f README.md

      - name: Mensaje de validacion
        run: echo "Proyecto validado correctamente"

